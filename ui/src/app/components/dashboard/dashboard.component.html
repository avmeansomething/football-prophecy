<div class="min-h-screen bg-gray-50">
  <div class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="pi pi-trophy text-red-500 text-2xl"></i>
        <h1 class="text-xl font-bold text-gray-900">Чемпионат Мира 2026</h1>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-600">
          <span class="ml-2 px-2 py-1 bg-gray-100 rounded text-xs">
          </span>
        </span>
        <button
          (click)="logout()"
          class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition text-sm"
        >
          Выйти
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm border p-6">
      <h2 class="text-2xl font-bold mb-4">Добро пожаловать!</h2>
      <p class="text-gray-600">Вы успешно вошли в систему.</p>
    </div>
  </div>
</div>
