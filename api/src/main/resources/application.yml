spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/football_predictor_2026
    username: football_user
    password: football_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        default_schema: public
    open-in-view: false

  sql:
    init:
      mode: always
      platform: postgresql
  web:
    error:
      include-binding-errors: always
      include-message: always

server:
  port: 8080

logging:
  level:
    com.football.prophency: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:footballPredictor2026SecretKeyWith256BitsMinimumLength}
  expiration: 86400000
  refresh-expiration: 604800000

# CORS
cors:
  allowed-origins:
    - http://localhost:4200
    - http://localhost:3000
